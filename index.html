<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F4F5F3">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>花费 · Zheng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F5F3; --card:#FFFFFF; --ink:#181B1F; --ink-2:#3D444C; --muted:#8B929B; --faint:#EDEEEB;
  --line:#EAECE8; --emerald:#0BA678; --emerald-dark:#087a58; --emerald-soft:#E4F6EF; --red:#DB5A54;
  --shadow:0 1px 2px rgba(20,30,25,.04),0 8px 24px rgba(20,30,25,.05);
  --shadow-lg:0 2px 8px rgba(20,30,25,.08),0 20px 48px rgba(20,30,25,.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink)}
body{font-family:"Outfit",-apple-system,"PingFang SC",system-ui,sans-serif;line-height:1.4;-webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) 0 0;min-height:100vh}
.wrap{max-width:520px;margin:0 auto;padding:0 18px 110px}

header{display:flex;align-items:center;justify-content:space-between;padding:20px 2px 14px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:10px;background:var(--emerald);display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;box-shadow:0 4px 12px rgba(11,166,120,.32)}
.brand .t{font-weight:700;font-size:19px;letter-spacing:-.2px}
.brand .t small{display:block;font-size:10px;letter-spacing:2.5px;color:var(--muted);font-weight:600;margin-top:-2px}
.msel{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 13px;box-shadow:var(--shadow);cursor:pointer;font-family:inherit}
.msel .lbl{font-size:14px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.msel .caret{font-size:11px;color:var(--muted);transition:transform .2s}
.msel.open .caret{transform:rotate(180deg)}

.banner{display:none;background:var(--emerald-soft);border-radius:12px;padding:11px 14px;margin-bottom:16px;font-size:12.5px;color:var(--emerald-dark);font-weight:500;align-items:center;gap:7px}
.banner.show{display:flex}
.tab{display:none}.tab.on{display:block}

.hero{background:linear-gradient(160deg,#0BA678,#0a8f68 60%,#0b7d5c);border-radius:22px;padding:22px 22px 18px;color:#fff;box-shadow:0 8px 28px rgba(11,140,100,.28);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,255,255,.14),transparent 70%)}
.hero .cap{font-size:12.5px;opacity:.85;font-weight:500}
.hero .amt{font-weight:800;font-size:44px;letter-spacing:-1.5px;margin:3px 0 2px;font-variant-numeric:tabular-nums;line-height:1}
.hero .amt .s{font-size:.46em;font-weight:600;opacity:.9;margin-right:3px}
.hero .other{font-size:12.5px;opacity:.82;font-weight:500;margin-top:1px;font-variant-numeric:tabular-nums;min-height:16px}
.hero .other .sep{opacity:.5;margin:0 6px}
.hero .row2{display:flex;gap:26px;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.18)}
.hero .mini .k{font-size:11px;opacity:.8;margin-bottom:2px}
.hero .mini .v{font-weight:700;font-size:16px;font-variant-numeric:tabular-nums}
.hero .mini .v small{font-weight:500;opacity:.85;font-size:11px}

.calcard{background:var(--card);border-radius:20px;padding:16px 16px 18px;margin-top:16px;box-shadow:var(--shadow)}
.calcard .ch{font-weight:700;font-size:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:baseline}
.calcard .ch .hint{font-size:11px;color:var(--muted);font-weight:500}
.cal-h{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-h span{text-align:center;font-size:11px;color:var(--muted);font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-c{aspect-ratio:1/1;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--faint);position:relative;cursor:default;overflow:hidden}
.cal-c.empty{background:transparent;visibility:hidden}
.cal-c.lvl0{background:var(--faint)}
.cal-c .dn{font-size:13px;font-weight:600;color:var(--ink-2);letter-spacing:-.2px;z-index:1}
.cal-c.has{cursor:pointer}
.cal-c.has .dn{color:var(--ink)}
.cal-c.hasdark .dn{color:#fff}
.cal-c.today{outline:2px solid var(--emerald);outline-offset:-2px}
.cal-c.today .dn{color:var(--emerald-dark);font-weight:700}.cal-c.today.hasdark .dn{color:#fff}

.donutcard{background:var(--card);border-radius:20px;padding:20px 16px 8px;box-shadow:var(--shadow)}
.donut{position:relative;width:190px;height:190px;margin:0 auto 6px}
.donut.sm{width:140px;height:140px;margin:4px auto 10px}
.donut svg{width:100%;height:100%}
.donut .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.donut .ctr .l{font-size:11px;color:var(--muted);font-weight:500}.donut.sm .ctr .l{font-size:10px}
.donut .ctr .v{font-weight:800;font-size:24px;font-variant-numeric:tabular-nums;letter-spacing:-.5px;margin-top:2px}.donut.sm .ctr .v{font-size:18px}
.donut .ctr .v .s{font-size:.55em;color:var(--muted);font-weight:600}

.section-h{display:flex;align-items:baseline;justify-content:space-between;margin:24px 2px 12px}
.section-h .h{font-weight:700;font-size:15px}.section-h .sub{font-size:12px;color:var(--muted)}
.cats{background:var(--card);border-radius:18px;padding:6px 16px;box-shadow:var(--shadow)}
.catrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.catrow:last-child{border-bottom:none}
.catrow .ci{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:19px;flex-shrink:0}
.catrow .cn{flex:1;min-width:0}.catrow .cn .nm{font-weight:600;font-size:14px}
.catrow .track{height:6px;background:var(--faint);border-radius:3px;margin-top:6px;overflow:hidden}
.catrow .track .fl{height:100%;border-radius:3px;transition:width .45s cubic-bezier(.4,0,.2,1)}
.catrow .cv{text-align:right;flex-shrink:0}
.catrow .cv .cm{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}
.catrow .cv .cp{font-size:11px;color:var(--muted)}

/* timeline feed */
.day{margin-top:8px}
.dhead{display:flex;justify-content:space-between;align-items:baseline;padding:14px 6px 8px}
.dhead .dl{font-size:12.5px;color:var(--ink-2);font-weight:600}
.dhead .dt{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600}
.daycard{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.item{border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.tx{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer}
.tx .ci{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:19px;flex-shrink:0}
.tx .mid{flex:1;min-width:0}
.tx .m{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx .meta{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px}
.tx .src{font-size:10px;font-weight:600;padding:1px 6px;border-radius:5px;background:var(--faint);color:var(--ink-2)}
.tx .amt{font-weight:700;font-size:16px;font-variant-numeric:tabular-nums;text-align:right;flex-shrink:0}
.tx .amt.exp{color:var(--red)}.tx .amt.inc{color:var(--emerald)}
.tx .amt .cs{font-size:11px;opacity:.7;font-weight:500;margin:0 1px}
.tx-x{max-height:0;overflow:hidden;transition:max-height .25s ease;background:#FafBfa}
.tx-x.open{max-height:210px}
.tx-x .in{padding:8px 14px 13px;display:flex;flex-direction:column;gap:11px}
.editcats .lbl{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:7px;display:block}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.cchip{width:33px;height:33px;border-radius:10px;border:2px solid transparent;font-size:15px;cursor:pointer;display:grid;place-items:center;transition:.12s}
.cchip.on{transform:scale(1.08)}
.botrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.botrow .ref{font-size:11px;color:var(--muted);word-break:break-all;flex:1;min-width:0}
.btn-edit{background:var(--emerald-soft);border:none;color:var(--emerald-dark);border-radius:9px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}
.del{background:#FDE0E1;border:none;color:#D6383D;border-radius:9px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}

.empty{text-align:center;padding:44px 24px;color:var(--muted)}
.empty .e{font-size:40px;margin-bottom:10px}
.empty .big{font-weight:600;font-size:16px;color:var(--ink);margin-bottom:6px}
.empty p{font-size:13.5px;line-height:1.6}

.nav{position:fixed;left:0;right:0;bottom:0;z-index:35;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:8px 20px calc(8px + env(safe-area-inset-bottom));max-width:520px;margin:0 auto}
.nav .nb{background:none;border:none;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;padding:4px 20px;flex:1}
.nav .nb .ni{font-size:19px}.nav .nb.on{color:var(--emerald)}
.nav .plus{background:var(--emerald);color:#fff;border:none;width:52px;height:52px;border-radius:50%;font-size:26px;box-shadow:0 6px 18px rgba(11,166,120,.42);cursor:pointer;flex:0 0 auto;margin-top:-18px;transition:transform .15s}
.nav .plus:active{transform:scale(.94)}

.daypage{position:fixed;inset:0;z-index:45;background:var(--bg);transform:translateX(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);overflow-y:auto;max-width:520px;margin:0 auto;padding:env(safe-area-inset-top) 18px calc(30px + env(safe-area-inset-bottom))}
.daypage.show{transform:none}
.dp-top{display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px;position:sticky;top:0;background:var(--bg);z-index:2}
.dp-back{background:none;border:none;color:var(--emerald);font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;padding:4px 0}
.dp-title{font-weight:700;font-size:16px}
.dp-sum{background:linear-gradient(160deg,#0BA678,#0a8f68 60%,#0b7d5c);border-radius:20px;padding:20px;color:#fff;text-align:center;box-shadow:0 6px 20px rgba(11,140,100,.26)}
.dp-sum .l{font-size:12px;opacity:.85;font-weight:500}
.dp-sum .v{font-weight:800;font-size:38px;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1.05;margin-top:3px}
.dp-sum .v .s{font-size:.5em;font-weight:600;opacity:.9;margin-right:3px}
.dp-sum .sub{font-size:12.5px;opacity:.85;margin-top:6px;font-weight:500}
.dp-donut{background:var(--card);border-radius:20px;padding:18px 16px 8px;margin-top:14px;box-shadow:var(--shadow)}
.dp-cats{padding:2px 4px 8px}
.dp-catrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.dp-catrow:last-child{border-bottom:none}
.dp-catrow .ci{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:16px}
.dp-catrow .nm{font-weight:600;font-size:13.5px;flex:1}
.dp-catrow .pc{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.dp-catrow .vv{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;min-width:64px;text-align:right}

.mp-scrim{position:fixed;inset:0;background:rgba(15,20,17,.35);opacity:0;pointer-events:none;transition:.18s;z-index:65}
.mp-scrim.show{opacity:1;pointer-events:auto}
.mpick{position:fixed;left:50%;top:88px;transform:translate(-50%,-8px);z-index:66;background:var(--card);border-radius:20px;box-shadow:var(--shadow-lg);padding:16px;width:min(340px,90vw);opacity:0;pointer-events:none;transition:.2s}
.mpick.show{opacity:1;pointer-events:auto;transform:translate(-50%,0)}
.mp-yr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mp-yr button{background:var(--faint);border:none;width:34px;height:34px;border-radius:10px;font-size:18px;color:var(--ink-2);cursor:pointer;font-family:inherit}
.mp-yr .y{font-weight:700;font-size:17px;font-variant-numeric:tabular-nums}
.mp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mp-grid button{background:var(--faint);border:none;border-radius:12px;padding:13px 0;font-family:inherit;font-weight:600;font-size:14px;color:var(--ink-2);cursor:pointer;transition:.12s}
.mp-grid button:active{transform:scale(.96)}
.mp-grid button.cur{background:var(--emerald);color:#fff}
.mp-grid button.now{outline:2px solid var(--emerald);outline-offset:-2px;color:var(--emerald-dark)}
.mp-grid button.cur.now{color:#fff}

.scrim{position:fixed;inset:0;background:rgba(15,20,17,.4);opacity:0;pointer-events:none;transition:.22s;z-index:55}
.scrim.show{opacity:1;pointer-events:auto}
.add{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--bg);border-radius:26px 26px 0 0;transform:translateY(102%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-width:520px;margin:0 auto;max-height:94vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.add.show{transform:none}
.add-top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 4px}
.add-top .cancel{background:none;border:none;color:var(--muted);font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;width:44px;text-align:left}
.ie{display:flex;gap:3px;background:var(--faint);border-radius:10px;padding:3px}
.ie button{background:none;border:none;font-family:inherit;font-weight:700;font-size:14px;color:var(--muted);padding:7px 18px;border-radius:8px;cursor:pointer}
.ie button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.ie button.on[data-t="income"]{color:var(--emerald)}
.add-top .cur{display:flex;gap:3px;background:var(--faint);border-radius:9px;padding:3px;width:44px;justify-content:flex-end}
.curbtn{background:none;border:none;font-family:inherit;font-weight:700;font-size:11px;color:var(--emerald-dark);cursor:pointer;padding:6px 2px}
.catgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:12px 14px 4px;max-height:220px;overflow-y:auto}
.catpick{background:none;border:none;font-family:inherit;cursor:pointer;padding:7px 4px;border-radius:14px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.15s}
.catpick .pi{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;font-size:22px;transition:.15s;border:2px solid transparent}
.catpick .pn{font-size:11px;color:var(--muted);font-weight:500}
.catpick.on .pn{color:var(--ink);font-weight:700}
.amtline{display:flex;align-items:center;justify-content:space-between;padding:6px 22px 2px;gap:12px}
.amtline .note{flex:1;min-width:0;border:none;background:none;font-family:inherit;font-size:15px;color:var(--ink);padding:8px 0;border-bottom:1.5px solid var(--line)}
.amtline .note:focus{outline:none;border-color:var(--emerald)}
.amtline .amt{font-weight:800;font-size:32px;font-variant-numeric:tabular-nums;letter-spacing:-1px;white-space:nowrap}
.amtline .amt .s{font-size:.5em;color:var(--muted);font-weight:600;margin-right:3px}
.amtline .amt.zero{color:var(--muted)}
.amtline .amt.inc{color:var(--emerald)}
.datechip{display:flex;justify-content:center;padding:5px 0 2px}
.datechip label{background:var(--card);border:1px solid var(--line);border-radius:100px;padding:6px 14px;font-size:12.5px;color:var(--ink-2);font-weight:500;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.datechip input{border:none;background:none;font-family:inherit;font-size:12.5px;color:var(--ink-2);width:120px}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 10px;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.pad button{background:var(--card);border:none;font-family:inherit;font-weight:600;font-size:24px;color:var(--ink);padding:14px 0;border-radius:14px;cursor:pointer;box-shadow:var(--shadow);transition:.08s}
.pad button:active{background:var(--faint);transform:scale(.97)}
.pad .save{grid-column:span 3;background:var(--emerald);color:#fff;font-size:17px;font-weight:700;box-shadow:0 4px 14px rgba(11,166,120,.35);padding:15px}
.pad .save:active{background:var(--emerald-dark)}.pad .save:disabled{opacity:.4}.pad .bk{font-size:20px}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:2px solid var(--emerald);outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><div class="logo">￥</div><div class="t">花费<small>ZHENG</small></div></div>
    <button class="msel" id="mselBtn"><span class="lbl" id="monthLbl">—</span><span class="caret">▼</span></button>
  </header>
  <div class="banner" id="banner"><span>📋 演示数据 · 填好 WORKER_URL 后显示真实记录</span></div>

  <div class="tab on" id="tab1">
    <div class="hero">
      <div class="cap" id="heroCap">本月 · 支出</div>
      <div class="amt"><span class="s">S$</span><span id="tExp">0.00</span></div>
      <div class="other" id="tOther">&nbsp;</div>
      <div class="row2">
        <div class="mini"><div class="k">收入</div><div class="v"><small>S$</small><span id="tInc">0.00</span></div></div>
        <div class="mini"><div class="k">结余</div><div class="v" id="tBal">—</div></div>
        <div class="mini"><div class="k">笔数</div><div class="v" id="tCount">0</div></div>
      </div>
    </div>
    <div class="calcard">
      <div class="ch"><span>消费日历</span><span class="hint">颜色越深花越多 · 点开看当天</span></div>
      <div id="cal"></div>
    </div>
  </div>

  <div class="tab" id="tab2">
    <div class="donutcard" id="donutWrap">
      <div class="donut"><svg id="donutSvg" viewBox="0 0 42 42"></svg>
        <div class="ctr"><span class="l">本月支出</span><span class="v" id="donutTotal"><span class="s">S$</span>0</span></div></div>
    </div>
    <div class="section-h"><span class="h">分类</span><span class="sub" id="catSub"></span></div>
    <div class="cats" id="cats"></div>
    <div class="section-h"><span class="h">全部明细</span><span class="sub">点一笔可改</span></div>
    <div id="feed"></div>
  </div>
</div>

<div class="mp-scrim" id="mpScrim"></div>
<div class="mpick" id="mpick">
  <div class="mp-yr"><button id="mpPrevY">‹</button><span class="y" id="mpYear">2026</span><button id="mpNextY">›</button></div>
  <div class="mp-grid" id="mpGrid"></div>
</div>

<div class="nav">
  <button class="nb on" id="nav1"><span class="ni">📊</span>总览</button>
  <button class="plus" id="fab">＋</button>
  <button class="nb" id="nav2"><span class="ni">📋</span>明细</button>
</div>

<div class="daypage" id="dayPage">
  <div class="dp-top"><button class="dp-back" id="dpBack">‹ 返回</button><span class="dp-title" id="dpTitle"></span><span style="width:52px"></span></div>
  <div id="dpBody"></div>
</div>

<div class="scrim" id="scrim"></div>
<div class="add" id="add" role="dialog" aria-label="记一笔">
  <div class="add-top">
    <button class="cancel" id="cancel">取消</button>
    <div class="ie" id="ieSeg"><button data-t="expense" class="on">支出</button><button data-t="income">收入</button></div>
    <div class="cur"><button class="curbtn" id="curBtn">SGD</button></div>
  </div>
  <div class="catgrid" id="catgrid"></div>
  <div class="amtline">
    <input class="note" id="note" placeholder="备注（可留空）" autocomplete="off">
    <div class="amt zero" id="amtDisp"><span class="s">S$</span>0</div>
  </div>
  <div class="datechip"><label>📅 <input type="date" id="date"></label></div>
  <div class="pad" id="pad">

function merchantKey(m){return (m||'').toUpperCase().replace(/[#_].*$/,'').replace(/\s+\d[\d\s-]*$/,'').replace(/\b(SIN|SG|SINGAPORE|PTE|LTD)\b/g,'').replace(/\s+/g,' ').trim();}
function classifyKeyword(m){const s=(m||"").toLowerCase();
  if(/food|kopi|toast|restaurant|cafe|coffee|mcdonald|kfc|makan|hawker|eat|jia|zi char|nasi|chicken rice|tai fung|餐|饭|面|茶/.test(s))return"food";
  if(/fruit|水果|apple|orange|banana/.test(s))return"fruit";
  if(/snack|零食|candy|chocolate|冰/.test(s))return"snack";
  if(/beauty|cosmetic|sephora|skincare|美妆|化妆|护肤|防晒|香水/.test(s))return"beauty";
  if(/fairprice|ntuc|grocer|sheng siong|cold storage|giant|mart|provision|watson|guardian|unity|日用|纸巾|electric|water|singtel|starhub|m1|bill|utilit/.test(s))return"daily";
  if(/uniqlo|shopee|lazada|zara|h&m|store|mall|taobao|decathlon|衣|裤|鞋|包|购物/.test(s))return"shop";
  if(/mrt|bus|grab|gojek|taxi|comfort|transit|ez-link|shell|esso|caltex|parking|smrt|地铁|公交|车/.test(s))return"transport";
  if(/netflix|spotify|cinema|golden village|gv |game|steam|disney|娱乐|电影/.test(s))return"fun";
  if(/icloud|rent|insurance|家用|房租/.test(s))return"home";
  if(/装修|hardware|ikea|renovation/.test(s))return"reno";
  if(/travel|hotel|airbnb|flight|airline|scoot|klook|agoda|expedia|旅游|机票/.test(s))return"travel";
  if(/clinic|pharmacy|hospital|dental|polyclinic|医|药/.test(s))return"health";
  return"other";}
function catKey(r){if(r.type==='income')return (r.category&&INC[r.category])?r.category:'incother';
  if(r.category&&CAT[r.category])return r.category;const k=merchantKey(r.merchant);if(RULES[k]&&CAT[RULES[k]])return RULES[k];return classifyKeyword(r.merchant);}
function catInfo(r){const k=catKey(r);return (r.type==='income'?INC:CAT)[k]||{i:'✦',n:'其他',c:'#94A0AE'};}
const soft=c=>c+'26';
const isInc=r=>r.type==='income';

async function load(){
  if(!LIVE){DATA=DEMO.slice();RULES={};document.getElementById('banner').classList.add('show');buildAll();return;}
  try{const r=await fetch(`${CONFIG.WORKER_URL}/api/data?token=${encodeURIComponent(CONFIG.TOKEN)}`);if(!r.ok)throw 0;const j=await r.json();DATA=j.expenses||[];RULES=j.rules||{};buildAll();}
  catch(e){DATA=DEMO.slice();const b=document.getElementById('banner');b.innerHTML='<span>⚠️ 连不上 Worker（先显示演示数据）</span>';b.classList.add('show');buildAll();}
}
async function apiAdd(o){if(!LIVE)return {id:Date.now()};const r=await fetch(`${CONFIG.WORKER_URL}/api/expense`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...o,token:CONFIG.TOKEN})});return r.ok?await r.json():null;}
async function apiUpdate(id,o){if(!LIVE)return true;const r=await fetch(`${CONFIG.WORKER_URL}/api/update`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,...o,token:CONFIG.TOKEN})});return r.ok;}
function apiCategory(id,category,merchant){if(!LIVE)return;fetch(`${CONFIG.WORKER_URL}/api/category`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,category,merchant,token:CONFIG.TOKEN})});}
function apiDelete(id){if(!LIVE)return;fetch(`${CONFIG.WORKER_URL}/api/expense?id=${id}&token=${encodeURIComponent(CONFIG.TOKEN)}`,{method:"DELETE"});}

const fmt=n=>n.toLocaleString('en-SG',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK=n=>n>=1000?(n/1000).toFixed(1)+'k':fmt(n);
const sameMonth=ts=>{const d=new Date(ts);return d.getFullYear()===viewMonth.getFullYear()&&d.getMonth()===viewMonth.getMonth();};
const isoDay=ts=>{const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const WD=['周日','周一','周二','周三','周四','周五','周六'];
function dayHeader(ts){const d=new Date(ts),t=new Date(),one=864e5;const s=new Date(d.getFullYear(),d.getMonth(),d.getDate()),st=new Date(t.getFullYear(),t.getMonth(),t.getDate());const df=Math.round((st-s)/one);const pre=df===0?'今天 ':df===1?'昨天 ':'';return `${pre}${d.getMonth()+1}月${d.getDate()}日 ${WD[d.getDay()]}`;}
const esc=s=>String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function donutSegs(byKey,tot){const entries=Object.entries(byKey).sort((a,b)=>b[1].v-a[1].v);let acc=0,s='<circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#EDEEEB" stroke-width="5"/>';entries.forEach(([k,o])=>{const pct=o.v/tot*100;s+=`<circle cx="21" cy="21" r="15.915" fill="transparent" stroke="${o.c}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${pct.toFixed(2)} ${(100-pct).toFixed(2)}" stroke-dashoffset="${(25-acc).toFixed(2)}"/>`;acc+=pct;});return s;}

/* ============ builders ============ */
function buildAll(){updateHeader();buildCalendar();buildDonut();buildCats();buildFeed();}

function updateHeader(){
  const rows=DATA.filter(x=>sameMonth(x.ts));
  let exp=0,inc=0;const oth={USD:0,MYR:0};rows.forEach(r=>{if(isInc(r)){if(r.currency==='SGD')inc+=r.amount;return;}if(r.currency==='SGD')exp+=r.amount;else if(oth[r.currency]!=null)oth[r.currency]+=r.amount;});
  document.getElementById('monthLbl').textContent=(viewMonth.getMonth()+1)+'月 '+viewMonth.getFullYear();
  document.getElementById('tExp').textContent=fmt(exp);
  const parts=[];if(oth.USD)parts.push('US$ '+fmt(oth.USD));if(oth.MYR)parts.push('RM '+fmt(oth.MYR));
  document.getElementById('tOther').innerHTML=parts.length?('另 '+parts.join('<span class="sep">·</span>')):'&nbsp;';
  document.getElementById('tInc').textContent=fmt(inc);
  const bal=inc-exp;const be=document.getElementById('tBal');
  be.innerHTML='<small>S$</small>'+fmt(Math.abs(bal));be.style.color=bal<0?'#FFD9D2':'#fff';
  if(bal<0)be.innerHTML='<small>S$</small>-'+fmt(Math.abs(bal));
  document.getElementById('tCount').textContent=rows.length;
}
function buildCalendar(){
  const y=viewMonth.getFullYear(),m=viewMonth.getMonth();const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const per={};DATA.filter(x=>sameMonth(x.ts)&&x.currency==='SGD'&&!isInc(x)).forEach(x=>{const d=new Date(x.ts).getDate();per[d]=(per[d]||0)+x.amount;});
  const vals=Object.values(per),maxV=vals.length?Math.max(...vals):0;const t=new Date(),isCur=y===t.getFullYear()&&m===t.getMonth();
  let h='<div class="cal-h">'+['日','一','二','三','四','五','六'].map(d=>`<span>${d}</span>`).join('')+'</div><div class="cal-grid">';
  for(let i=0;i<first;i++)h+='<div class="cal-c empty"></div>';
  for(let d=1;d<=dim;d++){const v=per[d]||0;const ratio=maxV?v/maxV:0;
    let bg='var(--faint)',dark='';
    if(v>0){if(ratio>0.66){bg='#0BA678';dark=' hasdark';}else if(ratio>0.33){bg='#5FC49E';}else{bg='#C7EBD9';}}
    h+=`<div class="cal-c${v?' has':' lvl0'}${dark}${isCur&&d===t.getDate()?' today':''}" data-day="${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}" style="background:${bg}"><span class="dn">${d}</span></div>`;}
  h+='</div>';document.getElementById('cal').innerHTML=h;
}
function catAgg(rows){const by={},cnt={};rows.forEach(r=>{const k=catKey(r);const info=CAT[k]||{c:'#94A0AE'};if(!by[k])by[k]={v:0,c:info.c};by[k].v+=r.amount;cnt[k]=(cnt[k]||0)+1;});return {by,cnt};}
function buildDonut(){
  const rows=DATA.filter(x=>sameMonth(x.ts)&&x.currency==='SGD'&&!isInc(x));const tot=rows.reduce((s,r)=>s+r.amount,0);
  const wrap=document.getElementById('donutWrap');const {by}=catAgg(rows);
  if(!Object.keys(by).length||!tot){wrap.style.display='none';return;}wrap.style.display='block';
  document.getElementById('donutSvg').innerHTML=donutSegs(by,tot);
  document.getElementById('donutTotal').innerHTML='<span class="s">S$</span>'+fmt(tot);
}
function buildCats(){
  const rows=DATA.filter(x=>sameMonth(x.ts)&&x.currency==='SGD'&&!isInc(x));const tot=rows.reduce((s,r)=>s+r.amount,0);
  const {by,cnt}=catAgg(rows);const ce=document.getElementById('cats');const entries=Object.entries(by).sort((a,b)=>b[1].v-a[1].v);
  if(!entries.length){ce.innerHTML='<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">还没有 SGD 消费</div>';document.getElementById('catSub').textContent='';return;}
  const maxV=entries[0][1].v;document.getElementById('catSub').textContent=entries.length+' 类';
  ce.innerHTML=entries.map(([k,o])=>{const c=CAT[k];const pct=Math.round(o.v/(tot||1)*100);
    return `<div class="catrow"><div class="ci" style="background:${soft(c.c)}">${c.i}</div><div class="cn"><div class="nm">${c.n}</div><div class="track"><div class="fl" style="width:${Math.max(o.v/maxV*100,4)}%;background:${c.c}"></div></div></div><div class="cv"><div class="cm">${fmt(o.v)}</div><div class="cp">${pct}% · ${cnt[k]}笔</div></div></div>`;}).join('');
}
function txInner(r){
  const info=catInfo(r),k=catKey(r);const tm=new Date(r.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const src=r.source==='dbs'?'PayLah!':r.source==='ocbc'?('OCBC'+(r.card_last4?'·'+r.card_last4:'')):(isInc(r)?'收入':'手动');
  const name=info.n+(r.merchant?(' · '+esc(r.merchant)):'');
  const set=isInc(r)?INC:CAT;
  const chips=Object.keys(set).map(ck=>`<button class="cchip" data-cat="${ck}" title="${set[ck].n}" style="background:${soft(set[ck].c)};${ck===k?'border-color:'+set[ck].c:''}">${set[ck].i}</button>`).join('');
  return `<div class="tx"><div class="ci" style="background:${soft(info.c)}">${info.i}</div>
    <div class="mid"><div class="m">${name}</div><div class="meta"><span class="src">${src}</span><span>${tm}</span></div></div>
    <div class="amt ${isInc(r)?'inc':'exp'}">${isInc(r)?'+':'-'}<span class="cs">${CUR[r.currency]}</span>${fmt(r.amount)}</div></div>
  <div class="tx-x"><div class="in"><div class="editcats"><span class="lbl">改分类</span><div class="chips">${chips}</div></div>
    <div class="botrow"><span class="ref">${r.raw?esc(String(r.raw)):'无凭证号'}</span><button class="btn-edit" data-edit="${r.id}">改金额</button><button class="del" data-del="${r.id}">删除</button></div></div></div>`;
}
function itemEl(r){const el=document.createElement('div');el.className='item';el.dataset.id=r.id;el.dataset.ts=r.ts;el.innerHTML=txInner(r);return el;}
function dayEl(r){const el=document.createElement('div');el.className='day';el.dataset.day=isoDay(r.ts);
  el.innerHTML=`<div class="dhead"><span class="dl">${dayHeader(r.ts)}</span><span class="dt"></span></div><div class="daycard"></div>`;return el;}
function updateDaySubtotal(day){const dk=day.dataset.day;const sum=DATA.filter(x=>isoDay(x.ts)===dk&&x.currency==='SGD'&&!isInc(x)).reduce((s,x)=>s+x.amount,0);day.querySelector('.dt').textContent=sum?'支 '+fmt(sum):'';}
function buildFeed(){
  const feed=document.getElementById('feed');feed.innerHTML='';const rows=DATA.filter(x=>sameMonth(x.ts)).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  if(!rows.length){feed.innerHTML=`<div class="empty"><div class="e">🧾</div><div class="big">这个月还没有记录</div><p>银行邮件转发进来会自动出现；<br>点下面 ＋ 手动记账。</p></div>`;return;}
  let cur=null,dc=null,dayNode=null;
  rows.forEach(r=>{const dk=isoDay(r.ts);if(dk!==cur){cur=dk;dayNode=dayEl(r);feed.appendChild(dayNode);dc=dayNode.querySelector('.daycard');}dc.appendChild(itemEl(r));});
  feed.querySelectorAll('.day').forEach(updateDaySubtotal);
}
function insertItem(r){
  if(!sameMonth(r.ts))return;const feed=document.getElementById('feed');const emp=feed.querySelector('.empty');if(emp)emp.remove();
  const dk=isoDay(r.ts);let day=feed.querySelector(`.day[data-day="${dk}"]`);
  if(!day){day=dayEl(r);const days=[...feed.querySelectorAll('.day')];let placed=false;for(const d of days){if(dk>d.dataset.day){feed.insertBefore(day,d);placed=true;break;}}if(!placed)feed.appendChild(day);}
  const dc=day.querySelector('.daycard');const item=itemEl(r);const items=[...dc.querySelectorAll('.item')];let placed=false;
  for(const it of items){if(new Date(r.ts)>new Date(it.dataset.ts)){dc.insertBefore(item,it);placed=true;break;}}if(!placed)dc.appendChild(item);updateDaySubtotal(day);
}
function removeItem(id){
  const item=document.querySelector(`#feed .item[data-id="${id}"]`);if(!item)return;const day=item.closest('.day');item.remove();
  if(day&&!day.querySelector('.item'))day.remove();else if(day)updateDaySubtotal(day);
  const feed=document.getElementById('feed');if(!feed.querySelector('.item'))buildFeed();
}
function patchItem(id){
  const item=document.querySelector(`#feed .item[data-id="${id}"]`);if(!item)return;const r=DATA.find(x=>String(x.id)===String(id));if(!r)return;const info=catInfo(r);
  const ci=item.querySelector('.ci');ci.textContent=info.i;ci.style.background=soft(info.c);
  item.querySelector('.m').innerHTML=info.n+(r.merchant?(' · '+esc(r.merchant)):'');
  item.querySelector('.amt').innerHTML=`${isInc(r)?'+':'-'}<span class="cs">${CUR[r.currency]}</span>${fmt(r.amount)}`;
  const k=catKey(r);item.querySelectorAll('.cchip').forEach(ch=>{const on=ch.dataset.cat===k;ch.style.borderColor=on?(isInc(r)?INC:CAT)[ch.dataset.cat].c:'transparent';});
}

/* ============ day page ============ */
function buildDayPage(dayKey){
  openDayKey=dayKey;const rows=DATA.filter(x=>isoDay(x.ts)===dayKey).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const d=new Date(dayKey+'T00:00:00');document.getElementById('dpTitle').textContent=`${d.getMonth()+1}月${d.getDate()}日 ${WD[d.getDay()]}`;
  const exp=rows.filter(r=>!isInc(r));const sgdExp=exp.filter(r=>r.currency==='SGD');const totExp=sgdExp.reduce((s,r)=>s+r.amount,0);
  const inc=rows.filter(r=>isInc(r)&&r.currency==='SGD').reduce((s,r)=>s+r.amount,0);
  const {by,cnt}=catAgg(sgdExp);
  let h=`<div class="dp-sum"><div class="l">当天支出</div><div class="v"><span class="s">S$</span>${fmt(totExp)}</div><div class="sub">${exp.length} 笔${inc?' · 收入 +S$'+fmt(inc):''}</div></div>`;
  if(Object.keys(by).length){const entries=Object.entries(by).sort((a,b)=>b[1].v-a[1].v);
    h+=`<div class="dp-donut"><div class="donut sm"><svg viewBox="0 0 42 42">${donutSegs(by,totExp)}</svg><div class="ctr"><span class="l">分类</span><span class="v"><span class="s">S$</span>${fmt(totExp)}</span></div></div><div class="dp-cats">`;
    h+=entries.map(([k,o])=>{const c=CAT[k];const pct=Math.round(o.v/(totExp||1)*100);return `<div class="dp-catrow"><span class="ci" style="background:${soft(c.c)}">${c.i}</span><span class="nm">${c.n}</span><span class="pc">${pct}% · ${cnt[k]}笔</span><span class="vv">${fmt(o.v)}</span></div>`;}).join('')+'</div></div>';}
  h+='<div class="section-h"><span class="h">当天交易</span><span class="sub">点一笔可改</span></div><div id="dpFeed"><div class="daycard">';
  if(rows.length)rows.forEach(r=>{h+=`<div class="item" data-id="${r.id}" data-ts="${r.ts}">${txInner(r)}</div>`;});
  else h+='<div class="empty" style="padding:26px"><div class="big">这天没有记录</div></div>';
  h+='</div></div>';document.getElementById('dpBody').innerHTML=h;
}
function openDay(k){buildDayPage(k);const p=document.getElementById('dayPage');p.classList.add('show');p.scrollTop=0;}
function closeDay(){document.getElementById('dayPage').classList.remove('show');openDayKey=null;}
const dayOpen=()=>document.getElementById('dayPage').classList.contains('show');
document.getElementById('dpBody').addEventListener('click',e=>{
  const chip=e.target.closest('.cchip');if(chip){changeCategory(chip.closest('.item').dataset.id,chip.dataset.cat);buildDayPage(openDayKey);return;}
  const ed=e.target.closest('[data-edit]');if(ed){const r=DATA.find(x=>String(x.id)===String(ed.dataset.edit));if(r)openSheet(r);return;}
  const del=e.target.closest('[data-del]');if(del){if(confirm('删除这笔记录？')){doDelete(del.dataset.del);buildDayPage(openDayKey);}return;}
  const tx=e.target.closest('.tx');if(tx){tx.closest('.item').querySelector('.tx-x').classList.toggle('open');}
});
document.getElementById('dpBack').onclick=closeDay;

/* ============ interactions ============ */
function changeCategory(id,cat){
  const r=DATA.find(x=>String(x.id)===String(id));if(!r)return;r.category=cat;
  if(!isInc(r)){const key=merchantKey(r.merchant);RULES[key]=cat;DATA.forEach(x=>{if(!isInc(x)&&merchantKey(x.merchant)===key)patchItem(x.id);});}
  else patchItem(id);
  buildDonut();buildCats();apiCategory(id,cat,r.merchant);
}
function doDelete(id){DATA=DATA.filter(x=>String(x.id)!==String(id));removeItem(id);updateHeader();buildCalendar();buildDonut();buildCats();apiDelete(id);}
document.getElementById('feed').addEventListener('click',e=>{
  const chip=e.target.closest('.cchip');if(chip){changeCategory(chip.closest('.item').dataset.id,chip.dataset.cat);return;}
  const ed=e.target.closest('[data-edit]');if(ed){const r=DATA.find(x=>String(x.id)===String(ed.dataset.edit));if(r)openSheet(r);return;}
  const del=e.target.closest('[data-del]');if(del){if(confirm('删除这笔记录？'))doDelete(del.dataset.del);return;}
  const tx=e.target.closest('.tx');if(tx){tx.closest('.item').querySelector('.tx-x').classList.toggle('open');}
});
document.getElementById('cal').addEventListener('click',e=>{const c=e.target.closest('.cal-c.has');if(c)openDay(c.dataset.day);});

/* month picker */
const mpScrim=document.getElementById('mpScrim'),mpick=document.getElementById('mpick');
function renderMPick(){document.getElementById('mpYear').textContent=pickYear;const now=new Date();
  document.getElementById('mpGrid').innerHTML=Array.from({length:12},(_,i)=>{const isCur=pickYear===viewMonth.getFullYear()&&i===viewMonth.getMonth();const isNow=pickYear===now.getFullYear()&&i===now.getMonth();return `<button data-m="${i}" class="${isCur?'cur':''}${isNow?' now':''}">${i+1}月</button>`;}).join('');}
function openMPick(){pickYear=viewMonth.getFullYear();renderMPick();mpScrim.classList.add('show');mpick.classList.add('show');document.getElementById('mselBtn').classList.add('open');}
function closeMPick(){mpScrim.classList.remove('show');mpick.classList.remove('show');document.getElementById('mselBtn').classList.remove('open');}
document.getElementById('mselBtn').onclick=openMPick;mpScrim.onclick=closeMPick;
document.getElementById('mpPrevY').onclick=()=>{pickYear--;renderMPick();};
document.getElementById('mpNextY').onclick=()=>{pickYear++;renderMPick();};
document.getElementById('mpGrid').addEventListener('click',e=>{const b=e.target.closest('button[data-m]');if(!b)return;viewMonth=new Date(pickYear,parseInt(b.dataset.m),1);closeMPick();buildAll();});

/* tabs */
function switchTab(n){document.getElementById('tab1').classList.toggle('on',n===1);document.getElementById('tab2').classList.toggle('on',n===2);document.getElementById('nav1').classList.toggle('on',n===1);document.getElementById('nav2').classList.toggle('on',n===2);window.scrollTo({top:0});}
document.getElementById('nav1').onclick=()=>switchTab(1);document.getElementById('nav2').onclick=()=>switchTab(2);

/* add/edit sheet */
const scrim=document.getElementById('scrim'),add=document.getElementById('add');
function curSet(){return selType==='income'?INC:CAT;}
function buildCatGrid(){const set=curSet();document.getElementById('catgrid').innerHTML=Object.entries(set).map(([k,c])=>`<button class="catpick" data-c="${k}"><div class="pi" style="background:${soft(c.c)};${k===selCat?'border-color:'+c.c:''}">${c.i}</div><div class="pn">${c.n}</div></button>`).join('');}
function updAmt(){const el=document.getElementById('amtDisp');el.innerHTML=`<span class="s">${CUR[selCur]}</span>${amtStr}`;el.classList.toggle('zero',amtStr==='0');el.classList.toggle('inc',selType==='income');document.getElementById('save').disabled=(parseFloat(amtStr)||0)<=0;}
function setType(t){selType=t;selCat=t==='income'?'salary':'food';[...document.getElementById('ieSeg').children].forEach(x=>x.classList.toggle('on',x.dataset.t===t));document.getElementById('heroCap');buildCatGrid();updAmt();}
function openSheet(row){
  editingId=row?row.id:null;
  selType=row?(isInc(row)?'income':'expense'):'expense';
  selCat=row?catKey(row):'food';selCur=row?row.currency:'SGD';amtStr=row?String(row.amount):'0';
  [...document.getElementById('ieSeg').children].forEach(x=>x.classList.toggle('on',x.dataset.t===selType));
  document.getElementById('curBtn').textContent=selCur;
  document.getElementById('note').value=row?(row.merchant||''):'';
  document.getElementById('date').value=row?isoDay(row.ts):new Date().toISOString().slice(0,10);
  buildCatGrid();updAmt();scrim.classList.add('show');add.classList.add('show');
}
function closeSheet(){scrim.classList.remove('show');add.classList.remove('show');}
document.getElementById('fab').onclick=()=>openSheet(null);
document.getElementById('cancel').onclick=closeSheet;scrim.onclick=closeSheet;
document.getElementById('ieSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(b)setType(b.dataset.t);});
document.getElementById('curBtn').onclick=()=>{selCur=CURS[(CURS.indexOf(selCur)+1)%3];document.getElementById('curBtn').textContent=selCur;updAmt();};
document.getElementById('catgrid').addEventListener('click',e=>{const b=e.target.closest('.catpick');if(!b)return;selCat=b.dataset.c;const set=curSet();[...e.currentTarget.children].forEach(x=>{const pi=x.querySelector('.pi');pi.style.borderColor=x===b?set[x.dataset.c].c:'transparent';});[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));});
document.getElementById('pad').addEventListener('click',e=>{const b=e.target.closest('button[data-k]');if(!b)return;const k=b.dataset.k;
  if(k==='bk'){amtStr=amtStr.length<=1?'0':amtStr.slice(0,-1);if(!amtStr)amtStr='0';}
  else if(k==='.'){if(!amtStr.includes('.'))amtStr+='.';}
  else{if(amtStr.includes('.')&&amtStr.split('.')[1].length>=2)return;amtStr=(amtStr==='0')?k:amtStr+k;}updAmt();});
document.getElementById('save').onclick=async()=>{
  const amt=parseFloat(amtStr);if(!amt||amt<=0)return;const note=document.getElementById('note').value.trim();const date=document.getElementById('date').value||new Date().toISOString().slice(0,10);
  const btn=document.getElementById('save');btn.disabled=true;btn.textContent='保存中…';
  if(editingId!=null){
    const r=DATA.find(x=>String(x.id)===String(editingId));const tail=(r.ts.slice(11)||'12:00:00+08:00');
    r.amount=amt;r.currency=selCur;r.category=selCat;r.merchant=note;r.type=selType;r.ts=date+'T'+tail;
    if(selType!=='income')RULES[merchantKey(r.merchant)]=selCat;
    const ok=await apiUpdate(r.id,{amount:amt,currency:selCur,category:selCat,merchant:r.merchant,type:selType,ts:r.ts});
    btn.textContent='保存';btn.disabled=false;
    if(ok){if(!sameMonth(r.ts)){viewMonth=new Date(r.ts);buildAll();}else{removeItem(r.id);insertItem(r);updateHeader();buildCalendar();buildDonut();buildCats();}closeSheet();if(dayOpen())buildDayPage(openDayKey);}else alert('保存失败');
  }else{
    const payload={ts:date+'T12:00:00+08:00',amount:amt,currency:selCur,merchant:note,card_last4:null,source:'manual',type:selType,category:selCat,raw:''};
    const res=await apiAdd(payload);btn.textContent='保存';btn.disabled=false;
    if(res){payload.id=res.id||Date.now();DATA.push(payload);
      if(!sameMonth(payload.ts)){viewMonth=new Date(payload.ts);buildAll();}else{insertItem(payload);updateHeader();buildCalendar();buildDonut();buildCats();}closeSheet();if(dayOpen())buildDayPage(openDayKey);}else alert('保存失败，检查 Worker 连接');
  }
};

load();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
</body>
</html>
